services:

  api:
    build:
      context: ./
      dockerfile: docker/Dockerfile.prod
    command: gunicorn wsgi:app --bind 0.0.0.0:8001 --workers 4 --timeout 90 --access-logfile '-'
#    ports:
#      - "8001:8001"
    expose:
      - 8001
    volumes:
      - static_volume:/usr/src/flask_movie/src/static
      - media_volume:/usr/src/flask_movie/src/media
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    secrets:
      - flask_secret_key
      - pg_password
    depends_on:
      - db


  db:
    image: postgres:14-bookworm
    container_name: fm_db
    volumes:
      - pg_data:/var/lib/postgresql/data/
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_password
    secrets:
      - pg_password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 3s
      timeout: 2s
      retries: 2


  nginx:
    image: nginx:alpine-slim
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - static_volume:/flask_movie/static
      - media_volume:/flask_movie/media
    ports:
      - "8005:80"
    depends_on:
      - api


volumes:
  pg_data:
  static_volume:
  media_volume:


secrets:
  flask_secret_key:
    file: sets/secrets/secret_key.txt
  pg_password:
    file: sets/secrets/pg_secrets.txt
